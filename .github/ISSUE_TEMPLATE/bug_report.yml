name: Bug report
description: 설치 문제, 자산 연결 문제, 게임 내 오류를 제보합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        버그를 재현할 수 있도록 가능한 한 구체적으로 적어주세요.
  - type: input
    id: ootp_version
    attributes:
      label: OOTP version
      placeholder: ex. OOTP 27
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected area
      description: 어떤 영역에서 문제가 발생했나요?
      placeholder: ex. database, logos, uniforms, facegen, ballparks
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: 어떤 문제가 발생했는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: 원래 기대한 동작을 적어주세요.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      placeholder: 스크린샷, 로그, 오류 메시지가 있다면 첨부해주세요.
